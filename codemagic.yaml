workflows:
  ios-capacitor-build:
    name: Attendance CGS - iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        # These are placeholders — set the REAL values in
        # Codemagic dashboard → Environment variables (do NOT put secrets here)
        VITE_FIREBASE_API_KEY: $VITE_FIREBASE_API_KEY
        VITE_FIREBASE_AUTH_DOMAIN: $VITE_FIREBASE_AUTH_DOMAIN
        VITE_FIREBASE_PROJECT_ID: $VITE_FIREBASE_PROJECT_ID
        VITE_FIREBASE_STORAGE_BUCKET: $VITE_FIREBASE_STORAGE_BUCKET
        VITE_FIREBASE_MESSAGING_SENDER_ID: $VITE_FIREBASE_MESSAGING_SENDER_ID
        VITE_FIREBASE_APP_ID: $VITE_FIREBASE_APP_ID
        VITE_GROQ_API_KEY: $VITE_GROQ_API_KEY
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Write .env file from Codemagic variables
        script: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID
          VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID
          VITE_GROQ_API_KEY=$VITE_GROQ_API_KEY
          EOF

      - name: Build web app (Vite)
        script: |
          npm run build

      - name: Install Capacitor iOS platform
        script: |
          # @capacitor/cli is required for the `cap` command to exist.
          npm install @capacitor/cli @capacitor/core @capacitor/ios

          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

          # Capacitor 8 requires a minimum of iOS 15.0.
          # 1) Force the Podfile's own platform line
          if [ -f ios/App/Podfile ]; then
            sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/" ios/App/Podfile
          else
            echo "ERROR: ios/App/Podfile still missing after cap add ios"
            exit 1
          fi

          # 2) Make sure every pod (including any third-party SDKs like
          #    AnylineTireTreadSdk) inherits the same 15.0 target, so a
          #    lower per-pod deployment target can't conflict.
          if ! grep -q "IPHONEOS_DEPLOYMENT_TARGET" ios/App/Podfile; then
            cat >> ios/App/Podfile << 'EOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
    end
  end
end
EOF
          fi

          # 3) Force the Xcode project's own deployment target too,
          #    in case it's committed at an older value (e.g. 13.0).
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod repo update
          pod install

      - name: Set up code signing (unsigned/dev build)
        script: |
          # For a simple .ipa without App Store signing,
          # we build for "Any iOS Device" without exporting a signed archive.
          echo "Skipping signing setup — building unsigned dev artifact"

      - name: Build .xcarchive
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - nikilhadinesh@gmail.com
        notify:
          success: true
          failure: true
